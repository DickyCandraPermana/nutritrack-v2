version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/database/queries"
    schema: "internal/infrastructure/database/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "date"
            go_type: "time.Time"