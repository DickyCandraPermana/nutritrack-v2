version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: thearinazs
      POSTGRES_PASSWORD: MonsterBoom_124701
      POSTGRES_DB: nutritrack
    ports:
      - "5434:5432"
    volumes:
      - nutritrackdata:/var/lib/postgresql/data
    networks:
      - nutritrack-network
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secretpassword
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - nutritrack-network
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio-nutritrack
      MINIO_ROOT_PASSWORD: minionutritrackpassword
    volumes:
      - minio_nutritrack_data:/data
    command: server /data --console-address ":9001"
    networks:
      - nutritrack-network

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DB_URL: "postgres://thearinazs:MonsterBoom_124701@db:5432/nutritrack"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minio-nutritrack"
      MINIO_SECRET_KEY: "minionutritrackpassword"
      MINIO_BUCKET: "nutritrack-images"
      RABBITMQ_URL: "amqp://admin:secretpassword@rabbitmq:5672/"
      RABBITMQ_QUEUE: "ocr_tasks"
    depends_on:
      - db
      - minio
      - rabbitmq
    networks:
      - nutritrack-network

  worker-ai:
    build:
      context: ./worker-ai
    restart: always
    environment:
      RABBITMQ_URL: "amqp://admin:secretpassword@rabbitmq:5672/"
    depends_on:
      - rabbitmq
    networks:
      - nutritrack-network

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nutritrack-network
volumes:
  nutritrackdata:
  minio_nutritrack_data:
  rabbitmq_data:

networks:
  nutritrack-network:
    driver: bridge